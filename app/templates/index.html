<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoDevOps FinTech · Real-Time Stock Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#080c14; --surface:#0d1520; --surface2:#111d2e;
    --border:rgba(0,210,255,0.08); --accent:#00d2ff; --accent2:#00ff9d;
    --red:#ff4757; --green:#00ff9d; --yellow:#ffd32a;
    --text:#e8f4f8; --muted:#4a6a80; --glow:rgba(0,210,255,0.15);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,210,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,210,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

  /* NAV */
  nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:rgba(8,12,20,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
  .logo{font-weight:800;font-size:1.1rem;letter-spacing:.05em;}.logo span{color:var(--accent);}
  .nav-center{display:flex;align-items:center;gap:8px;}
  .nav-link{padding:6px 14px;border-radius:20px;font-size:.7rem;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);text-decoration:none;transition:all .2s;}
  .nav-link:hover,.nav-link.active{border-color:var(--accent);color:var(--accent);background:rgba(0,210,255,.08);}
  .nav-right{display:flex;align-items:center;gap:12px;}
  .live-badge{display:flex;align-items:center;gap:6px;font-size:.72rem;color:var(--green);}
  .live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 1.5s ease-in-out infinite;box-shadow:0 0 8px var(--green);}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}
  .auth-btn{padding:6px 14px;border-radius:20px;font-size:.7rem;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);text-decoration:none;transition:all .2s;}
  .auth-btn:hover{border-color:var(--accent);color:var(--accent);}
  .auth-btn.logout{border-color:rgba(255,71,87,.3);color:var(--red);}
  .username-label{font-size:.72rem;color:var(--accent);}

  /* NOTIFICATION BELL */
  .notif-btn{position:relative;background:transparent;border:1px solid var(--border);border-radius:20px;padding:6px 10px;cursor:pointer;color:var(--muted);font-size:.85rem;transition:all .2s;}
  .notif-btn:hover{border-color:var(--accent);color:var(--accent);}
  .notif-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:.55rem;font-weight:800;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center;border:2px solid var(--bg);}
  .notif-badge.show{display:flex;}

  /* TOAST NOTIFICATIONS */
  #toast-container{position:fixed;top:72px;right:20px;z-index:999;display:flex;flex-direction:column;gap:10px;pointer-events:none;}
  .toast{background:var(--surface2);border:1px solid rgba(0,255,157,.3);border-radius:12px;padding:14px 18px;min-width:300px;max-width:380px;pointer-events:all;animation:toastIn .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.5);}
  .toast.removing{animation:toastOut .3s ease forwards;}
  @keyframes toastIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
  @keyframes toastOut{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(40px);}}
  .toast-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .toast-icon{font-size:1rem;}
  .toast-title{font-size:.75rem;font-weight:700;color:var(--green);}
  .toast-close{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;}
  .toast-body{font-size:.72rem;color:var(--text);line-height:1.5;}
  .toast-sym{font-weight:800;color:var(--accent);}

  main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:32px 24px 80px;}
  .page-header{margin-bottom:28px;animation:fadeUp .6s ease both;}
  .page-title{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,#e8f4f8 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .page-sub{font-size:.72rem;color:var(--muted);margin-top:6px;letter-spacing:.05em;}.page-sub span{color:var(--accent);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

  /* SEARCH */
  .search-section{display:flex;gap:10px;margin-bottom:20px;animation:fadeUp .6s .05s ease both;}
  .search-wrapper{position:relative;flex:1;}
  .search-section input{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.85rem;outline:none;transition:border-color .2s;}
  .search-section input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,210,255,.08);}
  .search-section button{padding:12px 24px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),#0090b3);color:#fff;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .search-section button:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,210,255,.3);}
  .search-msg{font-size:.72rem;margin-bottom:10px;display:none;}
  .search-msg.error{color:var(--red);}.search-msg.ok{color:var(--green);}
  .autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;max-height:280px;overflow-y:auto;z-index:200;display:none;}
  .autocomplete-list.show{display:block;}
  .ac-item{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;border-bottom:1px solid rgba(0,210,255,.05);transition:background .15s;}
  .ac-item:hover{background:rgba(0,210,255,.1);}
  .ac-symbol{font-weight:700;color:var(--accent);font-size:.85rem;min-width:80px;}
  .ac-desc{font-size:.72rem;color:var(--muted);flex:1;margin-left:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ac-type{font-size:.6rem;padding:2px 8px;border-radius:4px;background:rgba(0,210,255,.1);color:var(--accent);margin-left:8px;}
  .ac-loading{padding:12px 16px;text-align:center;font-size:.72rem;color:var(--muted);}

  /* SUMMARY */
  .summary-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;animation:fadeUp .6s .1s ease both;}
  .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;position:relative;overflow:hidden;transition:border-color .3s;}
  .summary-card:hover{border-color:rgba(0,210,255,.25);}
  .summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);opacity:.5;}
  .summary-label{font-size:.62rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
  .summary-value{font-size:1.6rem;font-weight:800;margin-top:4px;line-height:1;}
  .summary-value.green{color:var(--green);}.summary-value.red{color:var(--red);}
  .summary-sub{font-size:.62rem;color:var(--muted);margin-top:4px;}

  /* FILTER */
  .filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;animation:fadeUp .6s .2s ease both;}
  .filter-label{font-size:.68rem;color:var(--muted);}
  .filter-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.68rem;cursor:pointer;transition:all .2s;}
  .filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,210,255,.06);}
  .sort-sel{margin-left:auto;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:.68rem;cursor:pointer;outline:none;}

  /* GRID */
  .stocks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;animation:fadeUp .6s .3s ease both;}
  .stock-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;cursor:pointer;transition:all .3s cubic-bezier(.2,0,0,1);position:relative;overflow:hidden;}
  .stock-card:hover{border-color:rgba(0,210,255,.3);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.4);}
  .stock-card.gaining::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),transparent);}
  .stock-card.losing::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),transparent);}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
  .card-ticker{font-size:1.1rem;font-weight:800;letter-spacing:.05em;}
  .card-name{font-size:.65rem;color:var(--muted);margin-top:2px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .card-badges{display:flex;gap:6px;align-items:center;}
  .badge-live{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;background:rgba(0,255,157,.1);border:1px solid rgba(0,255,157,.2);font-size:.58rem;color:var(--green);}
  .badge-sim{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);font-size:.58rem;color:#a78bfa;}
  .badge-yf{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;background:rgba(255,211,42,.1);border:1px solid rgba(255,211,42,.2);font-size:.58rem;color:var(--yellow);}
  .badge-live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
  .sparkline-wrap{height:48px;margin:8px 0;}
  .sparkline-wrap canvas{width:100%!important;height:48px!important;}
  .card-price{font-size:1.7rem;font-weight:800;letter-spacing:-.03em;line-height:1;margin-bottom:8px;}
  .card-change{display:flex;align-items:center;gap:8px;}
  .change-val{font-size:.78rem;font-weight:700;display:flex;align-items:center;gap:4px;}
  .change-val.up{color:var(--green);}.change-val.down{color:var(--red);}
  .change-pct{font-size:.72rem;padding:2px 8px;border-radius:4px;}
  .change-pct.up{background:rgba(0,255,157,.12);color:var(--green);}.change-pct.down{background:rgba(255,71,87,.12);color:var(--red);}
  .card-meta{display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:.6rem;color:var(--muted);}
  .card-meta span{display:flex;flex-direction:column;gap:2px;}
  .card-meta strong{color:var(--text);font-size:.68rem;}
  .card-hint{font-size:.6rem;color:var(--muted);text-align:center;margin-top:8px;opacity:.6;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(8,12,20,.88);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid rgba(0,210,255,.2);border-radius:20px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;padding:28px;position:relative;animation:scaleIn .25s cubic-bezier(.2,0,0,1);}
  @keyframes scaleIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
  .modal-close{position:absolute;top:16px;right:16px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .modal-close:hover{color:var(--text);border-color:var(--accent);}
  .modal-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px;}
  .modal-logo{width:44px;height:44px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
  .modal-logo img{width:100%;height:100%;object-fit:contain;}
  .modal-logo-placeholder{font-size:1.1rem;font-weight:800;color:var(--accent);}
  .modal-title-block .modal-ticker{font-size:1.8rem;font-weight:800;}
  .modal-title-block .modal-name{color:var(--muted);font-size:.78rem;margin-top:2px;}
  .modal-title-block .modal-industry{font-size:.65rem;color:var(--accent);margin-top:4px;}
  .modal-price-row{display:flex;align-items:baseline;gap:16px;margin:12px 0;}
  .modal-price{font-size:2.4rem;font-weight:800;}
  .modal-change{display:flex;gap:10px;align-items:center;}

  /* CHART TABS */
  .chart-tabs{display:flex;gap:6px;margin-bottom:12px;}
  .chart-tab{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.68rem;cursor:pointer;transition:all .2s;}
  .chart-tab:hover,.chart-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(0,210,255,.08);}

  /* Chart container */
  .modal-chart-wrap{height:220px;position:relative;margin-bottom:16px;}
  .modal-chart-wrap canvas{width:100%!important;height:220px!important;}
  .chart-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.72rem;color:var(--muted);}

  /* STATS GRID */
  .modal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
  .stat-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;}
  .stat-label{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
  .stat-val{font-size:1rem;font-weight:700;margin-top:4px;}

  /* NEWS */
  .modal-news{margin-top:4px;}
  .news-title{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
  .news-item{padding:10px 0;border-bottom:1px solid var(--border);}
  .news-item:last-child{border-bottom:none;}
  .news-headline{font-size:.78rem;color:var(--text);line-height:1.4;text-decoration:none;display:block;}
  .news-headline:hover{color:var(--accent);}
  .news-meta{font-size:.62rem;color:var(--muted);margin-top:4px;}
  .news-empty{font-size:.72rem;color:var(--muted);text-align:center;padding:16px;}

  /* TICKER TAPE */
  .ticker-tape{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(13,21,32,.95);border-top:1px solid var(--border);padding:8px 0;overflow:hidden;}
  .tape-track{display:flex;gap:40px;animation:tape 30s linear infinite;white-space:nowrap;}
  .tape-track:hover{animation-play-state:paused;}
  @keyframes tape{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  .tape-item{display:flex;align-items:center;gap:8px;font-size:.7rem;}
  .tape-sym{color:var(--accent);font-weight:700;}
  .tape-price{color:var(--text);}
  .tape-chg.up{color:var(--green);}.tape-chg.down{color:var(--red);}

  .loading-block{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted);}
  .spinner{width:44px;height:44px;border:3px solid var(--surface2);border-top-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 20px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  @media(max-width:600px){
    nav{padding:10px 14px;flex-wrap:wrap;gap:8px;}
    main{padding:16px 10px 80px;}
    .stocks-grid{grid-template-columns:1fr;}
    .nav-center{order:3;width:100%;justify-content:center;}
    .modal-stats{grid-template-columns:repeat(2,1fr);}
  }
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px;}
</style>
</head>
<body>

<nav>
  <div class="logo">AutoDevOps <span>FinTech</span></div>
  <div class="nav-center">
    <a href="/" class="nav-link active">Dashboard</a>
    <a href="/portfolio" class="nav-link">Portfolio</a>
    <a href="/alerts" class="nav-link">Alerts</a>
  </div>
  <div class="nav-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      <span id="nav-time">--:--:--</span>
    </div>
    <button class="notif-btn" onclick="toggleNotifPanel()" title="Notifications">
      🔔
      <span class="notif-badge" id="notif-badge">0</span>
    </button>
    <span class="username-label" id="username-display"></span>
    <a href="/login" class="auth-btn" id="auth-btn">Login</a>
  </div>
</nav>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<main>
  <div class="page-header">
    <h1 class="page-title">Real-Time Stock Dashboard</h1>
    <p class="page-sub">AutoDevOps FinTech · Finnhub + yfinance · Docker · K8s · Jenkins &nbsp;|&nbsp; <span>Auto-refresh every 15s</span></p>
  </div>

  <div class="search-section">
    <div class="search-wrapper">
      <input type="text" id="search-input" placeholder="Search any stock — AAPL, Tesla, NVDA, BTC-USD…" oninput="debouncedSuggest()" onkeydown="handleSearchKey(event)" autocomplete="off">
      <div class="autocomplete-list" id="ac-list"></div>
    </div>
    <button onclick="searchAndAdd()">🔍 Add Stock</button>
  </div>
  <div class="search-msg" id="search-msg"></div>

  <div class="summary-bar">
    <div class="summary-card">
      <div class="summary-label">Tracked</div>
      <div class="summary-value" id="sum-count">—</div>
      <div class="summary-sub">symbols</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Gainers</div>
      <div class="summary-value green" id="sum-gainers">—</div>
      <div class="summary-sub">today</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Losers</div>
      <div class="summary-value red" id="sum-losers">—</div>
      <div class="summary-sub">today</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Data Source</div>
      <div class="summary-value" style="font-size:1.1rem;color:var(--accent)" id="sum-source">—</div>
      <div class="summary-sub" id="sum-updated">—</div>
    </div>
  </div>

  <div class="filter-bar">
    <span class="filter-label">FILTER:</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="gaining">Gainers</button>
    <button class="filter-btn" data-filter="losing">Losers</button>
    <select class="sort-sel" id="sort-sel">
      <option value="default">Sort: Default</option>
      <option value="price-desc">Price ↓</option>
      <option value="price-asc">Price ↑</option>
      <option value="change-desc">Change % ↓</option>
      <option value="change-asc">Change % ↑</option>
    </select>
  </div>

  <div class="stocks-grid" id="stocks-grid">
    <div class="loading-block">
      <div class="spinner"></div>
      <div>Loading live stock data…</div>
    </div>
  </div>
</main>

<!-- STOCK DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-header">
      <div class="modal-logo" id="m-logo">
        <span class="modal-logo-placeholder" id="m-logo-placeholder"></span>
      </div>
      <div class="modal-title-block">
        <div class="modal-ticker" id="m-ticker"></div>
        <div class="modal-name" id="m-name"></div>
        <div class="modal-industry" id="m-industry"></div>
      </div>
    </div>
    <div class="modal-price-row">
      <div class="modal-price" id="m-price"></div>
      <div class="modal-change" id="m-change"></div>
    </div>

    <!-- CHART PERIOD TABS -->
    <div class="chart-tabs">
      <button class="chart-tab active" data-days="7">1W</button>
      <button class="chart-tab" data-days="14">2W</button>
      <button class="chart-tab" data-days="30">1M</button>
    </div>

    <div class="modal-chart-wrap">
      <canvas id="modal-chart"></canvas>
      <div class="chart-loading" id="chart-loading" style="display:none">Loading chart…</div>
    </div>

    <div class="modal-stats" id="modal-stats"></div>

    <div class="modal-news" id="modal-news"></div>
  </div>
</div>

<!-- TICKER TAPE -->
<div class="ticker-tape">
  <div class="tape-track" id="tape-track"></div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let allStocks    = [];
let customStocks = [];
let activeFilter = 'all';
let activeSort   = 'default';
let modalChart   = null;
let currentModalSymbol = null;
let currentModalDays   = 7;
let isLoggedIn   = false;

const fmt    = n => n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct = n => (n>0?'+':'')+n.toFixed(2)+'%';
const fmtVol = n => n>=1e9?(n/1e9).toFixed(1)+'B':n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':n;

// ── Auth ──────────────────────────────────────────────────────────────────────
async function checkAuth() {
  try {
    const res  = await fetch('/api/me');
    const data = await res.json();
    if (data.authenticated) {
      isLoggedIn = true;
      document.getElementById('username-display').textContent = '👤 ' + data.username;
      const ab = document.getElementById('auth-btn');
      ab.textContent = 'Logout'; ab.href = '/logout'; ab.classList.add('logout');
      startNotifPolling();
    }
  } catch(e) {}
}

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
let notifInterval = null;

function startNotifPolling() {
  pollNotifications();
  notifInterval = setInterval(pollNotifications, 30000);
}

async function pollNotifications() {
  if (!isLoggedIn) return;
  try {
    const res  = await fetch('/api/notifications');
    const data = await res.json();
    const count = data.count || 0;
    const badge = document.getElementById('notif-badge');
    if (count > 0) {
      badge.textContent = count;
      badge.classList.add('show');
      // Show toast for each new notification
      (data.notifications || []).forEach(n => showAlertToast(n));
      // Mark as read after displaying
      fetch('/api/notifications/read', {method:'POST'});
    } else {
      badge.classList.remove('show');
    }
  } catch(e) {}
}

function toggleNotifPanel() {
  // Re-poll on bell click
  pollNotifications();
}

function showAlertToast(notif) {
  const container = document.getElementById('toast-container');
  const toast     = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `
    <div class="toast-header">
      <span class="toast-icon">🔔</span>
      <span class="toast-title">PRICE ALERT TRIGGERED</span>
      <button class="toast-close" onclick="dismissToast(this.closest('.toast'))">✕</button>
    </div>
    <div class="toast-body">
      <span class="toast-sym">${notif.symbol}</span> — ${notif.message}
    </div>
  `;
  container.appendChild(toast);
  // Auto-dismiss after 8 seconds
  setTimeout(() => dismissToast(toast), 8000);
}

function dismissToast(toast) {
  if (!toast || !toast.parentNode) return;
  toast.classList.add('removing');
  setTimeout(() => toast.parentNode && toast.parentNode.removeChild(toast), 300);
}

// ── STOCK DATA ────────────────────────────────────────────────────────────────
async function fetchStocks() {
  try {
    const res    = await fetch('/api/stocks');
    const data   = await res.json();
    allStocks    = data.stocks;

    const customProms  = customStocks.map(s => fetch('/api/stock/'+s).then(r=>r.ok?r.json():null).catch(()=>null));
    const customData   = (await Promise.all(customProms)).filter(s=>s&&!s.error);
    const defaultSyms  = new Set(allStocks.map(s=>s.symbol));
    const merged       = [...allStocks, ...customData.filter(s=>!defaultSyms.has(s.symbol))];

    renderGrid(merged);
    updateSummary(merged);
    updateTape(merged);
  } catch(err) {
    document.getElementById('stocks-grid').innerHTML = `
      <div class="loading-block" style="color:var(--red)">Failed to load: ${err.message}</div>`;
  }
}

// ── AUTOCOMPLETE ──────────────────────────────────────────────────────────────
let suggestTimer = null, acIdx = -1;

function debouncedSuggest() { clearTimeout(suggestTimer); acIdx=-1; suggestTimer=setTimeout(fetchSuggestions,280); }

async function fetchSuggestions() {
  const q    = document.getElementById('search-input').value.trim();
  const list = document.getElementById('ac-list');
  if (q.length < 1) { list.classList.remove('show'); return; }
  list.innerHTML = '<div class="ac-loading">Searching…</div>';
  list.classList.add('show');
  try {
    const res   = await fetch('/api/suggest?q='+encodeURIComponent(q));
    const data  = await res.json();
    const items = data.suggestions || [];
    if (!items.length) { list.innerHTML='<div class="ac-loading">No results</div>'; return; }
    list.innerHTML = items.map(item=>`
      <div class="ac-item" onclick="selectSuggestion('${item.symbol}')">
        <span class="ac-symbol">${item.symbol}</span>
        <span class="ac-desc">${item.description||''}</span>
        <span class="ac-type">${item.type||'Stock'}</span>
      </div>`).join('');
  } catch(e) { list.innerHTML='<div class="ac-loading">Search failed</div>'; }
}

function selectSuggestion(sym) {
  document.getElementById('search-input').value = sym;
  document.getElementById('ac-list').classList.remove('show');
  searchAndAdd();
}

function handleSearchKey(e) {
  const list  = document.getElementById('ac-list');
  const items = list.querySelectorAll('.ac-item');
  if (!list.classList.contains('show') || !items.length) { if(e.key==='Enter') searchAndAdd(); return; }
  if (e.key==='ArrowDown')   { e.preventDefault(); acIdx=Math.min(acIdx+1,items.length-1); highlightAc(items); }
  else if (e.key==='ArrowUp') { e.preventDefault(); acIdx=Math.max(acIdx-1,0); highlightAc(items); }
  else if (e.key==='Enter')  { e.preventDefault(); acIdx>=0?selectSuggestion(items[acIdx].querySelector('.ac-symbol').textContent):searchAndAdd(); }
  else if (e.key==='Escape') { list.classList.remove('show'); }
}
function highlightAc(items) { items.forEach((el,i)=>el.style.background=i===acIdx?'rgba(0,210,255,.15)':''); }

document.addEventListener('click', e => { if(!e.target.closest('.search-wrapper')) document.getElementById('ac-list').classList.remove('show'); });

async function searchAndAdd() {
  const input = document.getElementById('search-input');
  const sym   = input.value.trim().toUpperCase();
  if (!sym) return;
  const msgEl = document.getElementById('search-msg');
  msgEl.textContent='Searching '+sym+'…'; msgEl.className='search-msg ok'; msgEl.style.display='block';
  try {
    const res  = await fetch('/api/stock/'+sym);
    if (!res.ok) { msgEl.textContent='Symbol "'+sym+'" not found or invalid'; msgEl.className='search-msg error'; return; }
    const data = await res.json();
    if (!customStocks.includes(sym) && !allStocks.find(s=>s.symbol===sym)) customStocks.push(sym);
    msgEl.textContent = sym+' added — $'+fmt(data.price); msgEl.className='search-msg ok';
    input.value = '';
    document.getElementById('ac-list').classList.remove('show');
    fetchStocks();
    setTimeout(()=>msgEl.style.display='none', 3500);
  } catch(err) { msgEl.textContent='Error: '+err.message; msgEl.className='search-msg error'; }
}

// ── SPARKLINE (inline canvas) ─────────────────────────────────────────────────
function drawSparkline(canvas, history, isUp) {
  const W = canvas.offsetWidth || 260, H = 48;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if (!history || history.length < 2) return;

  const vals = history.map(h => h.close || h.price || 0);
  const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx-mn || 1;
  const pts = vals.map((v,i) => ({ x:(i/(vals.length-1))*W, y:H-((v-mn)/rng)*(H-6)-3 }));
  const col = isUp ? '0,255,157' : '255,71,87';

  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,`rgba(${col},.25)`); grad.addColorStop(1,`rgba(${col},0)`);

  ctx.beginPath(); ctx.moveTo(pts[0].x,H);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,H); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();

  ctx.beginPath(); pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=isUp?'#00ff9d':'#ff4757'; ctx.lineWidth=1.5; ctx.stroke();

  const last=pts[pts.length-1];
  ctx.beginPath(); ctx.arc(last.x,last.y,3,0,Math.PI*2);
  ctx.fillStyle=isUp?'#00ff9d':'#ff4757'; ctx.fill();
}

// ── RENDER GRID ───────────────────────────────────────────────────────────────
function getFiltered(stocks) {
  let arr = [...stocks];
  if (activeFilter==='gaining') arr=arr.filter(s=>s.change>=0);
  else if (activeFilter==='losing') arr=arr.filter(s=>s.change<0);
  if (activeSort==='price-desc') arr.sort((a,b)=>b.price-a.price);
  else if (activeSort==='price-asc') arr.sort((a,b)=>a.price-b.price);
  else if (activeSort==='change-desc') arr.sort((a,b)=>b.change_pct-a.change_pct);
  else if (activeSort==='change-asc') arr.sort((a,b)=>a.change_pct-b.change_pct);
  return arr;
}

function renderGrid(stocks) {
  const arr  = getFiltered(stocks);
  const grid = document.getElementById('stocks-grid');
  grid.innerHTML = '';
  if (!arr.length) { grid.innerHTML='<div class="loading-block">No stocks match filter</div>'; return; }

  arr.forEach(s => {
    const isUp  = s.change >= 0;
    const div   = document.createElement('div');
    div.className = `stock-card ${isUp?'gaining':'losing'}`;
    div.dataset.symbol = s.symbol;

    const badge = s.source==='finnhub'
      ? '<div class="badge-live"><div class="badge-live-dot"></div>LIVE</div>'
      : s.source==='yfinance'
        ? '<div class="badge-yf">⚡ YF</div>'
        : '<div class="badge-sim">◉ SIM</div>';

    div.innerHTML = `
      <div class="card-top">
        <div>
          <div class="card-ticker">${s.symbol}</div>
          <div class="card-name" id="cname-${s.symbol}">—</div>
        </div>
        <div class="card-badges">${badge}</div>
      </div>
      <div class="sparkline-wrap"><canvas></canvas></div>
      <div class="card-price">$${fmt(s.price)}</div>
      <div class="card-change">
        <div class="change-val ${isUp?'up':'down'}">${isUp?'▲':'▼'} $${Math.abs(s.change).toFixed(2)}</div>
        <div class="change-pct ${isUp?'up':'down'}">${fmtPct(s.change_pct)}</div>
      </div>
      <div class="card-meta">
        <span><div>Prev Close</div><strong>$${fmt(s.previous_close||0)}</strong></span>
        <span><div>H/L</div><strong>$${fmt(s.high||0)} / $${fmt(s.low||0)}</strong></span>
      </div>
      <div class="card-hint">Click for chart & details →</div>`;

    div.addEventListener('click', () => openModal(s.symbol));
    grid.appendChild(div);

    // Load sparkline via history API
    fetch(`/api/stock/${s.symbol}/history?days=7`)
      .then(r=>r.json())
      .then(data => {
        const card   = grid.querySelector(`[data-symbol="${s.symbol}"]`);
        if (!card) return;
        const canvas = card.querySelector('canvas');
        if (canvas && data.history?.length) drawSparkline(canvas, data.history, isUp);
      }).catch(()=>{});

    // Load company name
    fetch(`/api/stock/${s.symbol}/profile`)
      .then(r=>r.ok?r.json():null)
      .then(p => {
        if (p && p.name) {
          const el = document.getElementById(`cname-${s.symbol}`);
          if (el) el.textContent = p.name;
        }
      }).catch(()=>{});
  });
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
async function openModal(symbol) {
  currentModalSymbol = symbol;
  currentModalDays   = 7;

  // Reset active tab
  document.querySelectorAll('.chart-tab').forEach(t=>t.classList.toggle('active', t.dataset.days==='7'));

  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('open');

  // Reset UI
  document.getElementById('m-ticker').textContent     = symbol;
  document.getElementById('m-name').textContent       = 'Loading…';
  document.getElementById('m-industry').textContent   = '';
  document.getElementById('m-price').textContent      = '—';
  document.getElementById('m-change').innerHTML       = '';
  document.getElementById('modal-stats').innerHTML    = '';
  document.getElementById('modal-news').innerHTML     = '';
  document.getElementById('m-logo-placeholder').textContent = symbol.charAt(0);
  document.getElementById('m-logo').querySelector('img') && (document.getElementById('m-logo').innerHTML = `<span class="modal-logo-placeholder">${symbol.charAt(0)}</span>`);

  try {
    // Fetch quote, profile, news in parallel
    const [quoteRes, profileRes, newsRes] = await Promise.all([
      fetch('/api/stock/'+symbol),
      fetch('/api/stock/'+symbol+'/profile'),
      fetch('/api/stock/'+symbol+'/news?count=5'),
    ]);

    const quote   = await quoteRes.json();
    const profile = profileRes.ok ? await profileRes.json() : {};
    const newsData= newsRes.ok   ? await newsRes.json()    : {news:[]};

    if (quote.error) return;

    const isUp = quote.change >= 0;

    // Header
    document.getElementById('m-ticker').textContent   = symbol;
    document.getElementById('m-name').textContent     = profile.name || symbol;
    document.getElementById('m-industry').textContent = profile.industry || '';

    // Logo
    if (profile.logo) {
      document.getElementById('m-logo').innerHTML = `<img src="${profile.logo}" onerror="this.parentNode.innerHTML='<span class=\\'modal-logo-placeholder\\'>${symbol.charAt(0)}</span>'">`;
    }

    // Price
    document.getElementById('m-price').textContent  = '$'+fmt(quote.price);
    document.getElementById('m-change').innerHTML   = `
      <div class="change-val ${isUp?'up':'down'}" style="font-size:1.1rem">${isUp?'▲':'▼'} $${Math.abs(quote.change).toFixed(2)}</div>
      <div class="change-pct ${isUp?'up':'down'}" style="font-size:.88rem">${fmtPct(quote.change_pct)}</div>`;

    // Stats
    document.getElementById('modal-stats').innerHTML = `
      <div class="stat-box"><div class="stat-label">Prev Close</div><div class="stat-val">$${fmt(quote.previous_close||0)}</div></div>
      <div class="stat-box"><div class="stat-label">Day High</div><div class="stat-val" style="color:var(--green)">$${fmt(quote.high||0)}</div></div>
      <div class="stat-box"><div class="stat-label">Day Low</div><div class="stat-val" style="color:var(--red)">$${fmt(quote.low||0)}</div></div>
      <div class="stat-box"><div class="stat-label">Open</div><div class="stat-val">$${fmt(quote.open||0)}</div></div>
      <div class="stat-box"><div class="stat-label">Market Cap</div><div class="stat-val">${profile.market_cap?'$'+fmtVol(profile.market_cap*1e6):'—'}</div></div>
      <div class="stat-box"><div class="stat-label">Source</div><div class="stat-val" style="font-size:.78rem;color:var(--accent)">${(quote.source||'').toUpperCase()}</div></div>`;

    // News
    const news = newsData.news || [];
    document.getElementById('modal-news').innerHTML = `
      <div class="news-title">Recent News</div>
      ${news.length ? news.map(n=>`
        <div class="news-item">
          <a class="news-headline" href="${n.url}" target="_blank" rel="noopener">${n.headline}</a>
          <div class="news-meta">${n.source} · ${n.datetime}</div>
        </div>`).join('') : '<div class="news-empty">No recent news available</div>'}`;

    // Load chart
    await loadModalChart(symbol, 7);

  } catch(err) {
    console.error('Modal error:', err);
  }
}

async function loadModalChart(symbol, days) {
  document.getElementById('chart-loading').style.display = 'flex';

  try {
    const res  = await fetch(`/api/stock/${symbol}/history?days=${days}`);
    const data = await res.json();
    const hist = data.history || [];

    if (modalChart) { modalChart.destroy(); modalChart = null; }

    const canvas = document.getElementById('modal-chart');
    const ctx    = canvas.getContext('2d');

    if (!hist.length) {
      document.getElementById('chart-loading').style.display = 'flex';
      document.getElementById('chart-loading').textContent = 'No chart data available';
      return;
    }

    document.getElementById('chart-loading').style.display = 'none';

    const labels = hist.map(h => h.date);
    const closes = hist.map(h => h.close);
    const isUp   = closes[closes.length-1] >= closes[0];
    const color  = isUp ? '#00ff9d' : '#ff4757';

    modalChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: symbol,
          data: closes,
          borderColor: color,
          borderWidth: 2,
          pointRadius: 3,
          pointHoverRadius: 6,
          pointBackgroundColor: color,
          tension: 0.3,
          fill: true,
          backgroundColor: (context) => {
            const chart = context.chart;
            const {ctx: c, chartArea} = chart;
            if (!chartArea) return 'transparent';
            const grad = c.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
            grad.addColorStop(0, isUp?'rgba(0,255,157,0.25)':'rgba(255,71,87,0.25)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            return grad;
          },
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0d1520',
            borderColor: 'rgba(0,210,255,0.3)',
            borderWidth: 1,
            titleColor: '#00d2ff',
            bodyColor: '#e8f4f8',
            callbacks: {
              label: ctx => ` $${fmt(ctx.parsed.y)}`
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(0,210,255,0.04)' },
            ticks: { color: '#4a6a80', font: { size: 10 }, maxTicksLimit: 7 }
          },
          y: {
            position: 'right',
            grid: { color: 'rgba(0,210,255,0.04)' },
            ticks: { color: '#4a6a80', font: { size: 10 }, callback: v => '$'+fmt(v) }
          }
        }
      }
    });
  } catch(err) {
    document.getElementById('chart-loading').textContent = 'Failed to load chart';
  }
}

// Chart tab switching
document.querySelectorAll('.chart-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.chart-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentModalDays = parseInt(tab.dataset.days);
    if (currentModalSymbol) loadModalChart(currentModalSymbol, currentModalDays);
  });
});

// Close modal
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  if (modalChart) { modalChart.destroy(); modalChart=null; }
  currentModalSymbol = null;
}

// ── SUMMARY & TAPE ────────────────────────────────────────────────────────────
function updateSummary(stocks) {
  const gainers = stocks.filter(s=>s.change>=0).length;
  const live    = stocks.filter(s=>s.source==='finnhub').length;
  const yf      = stocks.filter(s=>s.source==='yfinance').length;
  document.getElementById('sum-count').textContent   = stocks.length;
  document.getElementById('sum-gainers').textContent = gainers;
  document.getElementById('sum-losers').textContent  = stocks.length-gainers;
  document.getElementById('sum-source').textContent  = live>0?`${live} Live`:`${yf} YF / ${stocks.length-live-yf} Sim`;
  document.getElementById('sum-updated').textContent = 'Updated '+new Date().toLocaleTimeString();
}

function updateTape(stocks) {
  const html = [...stocks,...stocks].map(s=>{
    const isUp=s.change>=0;
    return `<div class="tape-item"><span class="tape-sym">${s.symbol}</span><span class="tape-price">$${fmt(s.price)}</span><span class="tape-chg ${isUp?'up':'down'}">${fmtPct(s.change_pct)}</span></div>`;
  }).join('');
  document.getElementById('tape-track').innerHTML = html;
}

// ── FILTER & SORT ─────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    fetchStocks();
  });
});
document.getElementById('sort-sel').addEventListener('change', e => { activeSort=e.target.value; fetchStocks(); });

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function updateClock() { document.getElementById('nav-time').textContent = new Date().toLocaleTimeString(); }
setInterval(updateClock, 1000); updateClock();

// ── INIT ──────────────────────────────────────────────────────────────────────
checkAuth();
fetchStocks();
setInterval(fetchStocks, 15000);
</script>
