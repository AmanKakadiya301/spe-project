input {
  # Accept logs from Docker containers via syslog
  syslog {
    port => 5000
    type => "docker"
  }
  
  # Also accept Beats input (if using Filebeat later)
  beats {
    port => 5044
  }
}

filter {
  # The Flask app prints structured JSON logs
  if [type] == "docker" or [container][name] =~ "stock-app" {
    
    # Try to parse the log line as JSON
    json {
      source => "message"
      target => "app_log"
      skip_on_invalid_json => true
    }

    # If it successfully parsed, elevate the fields to the root
    if "_jsonparsefailure" not in [tags] {
      mutate {
        add_field => {
          "level"       => "%{[app_log][level]}"
          "service"     => "%{[app_log][service]}"
          "app_message" => "%{[app_log][message]}"
        }
      }
      
      # For HTTP Request logs (from our middleware)
      if [app_log][event] == "http_request" {
        mutate {
          add_field => {
            "req_method"   => "%{[app_log][method]}"
            "req_path"     => "%{[app_log][path]}"
            "req_status"   => "%{[app_log][status]}"
            "req_duration" => "%{[app_log][duration_ms]}"
          }
        }
        
        # Convert duration to float for metrics/dashboards
        mutate {
          convert => {
            "req_status"   => "integer"
            "req_duration" => "float"
          }
        }
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "stock-app-logs-%{+YYYY.MM.dd}"
  }
  
  # Also print to stdout for debugging Logstash itself
  stdout { codec => rubydebug }
}
