global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'kakadiyaaman2004@gmail.com'
  smtp_auth_username: 'kakadiyaaman2004@gmail.com'
  smtp_auth_password: 'your-gmail-app-password'

route:
  group_by: ['alertname','severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: email

receivers:
  - name: email
    email_configs:
      - to: 'kakadiyaaman2004@gmail.com'
        send_resolved: true

inhibit_rules:
  - source_match: {severity: critical}
    target_match: {severity: warning}
    equal: [alertname]
