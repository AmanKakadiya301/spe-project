# docker-compose.yml — AutoDevOps FinTech Local Development Stack
# Runs Stock App + PostgreSQL + Redis + full ELK Stack together.
#
# Usage:
#   docker-compose up -d            # start all services
#   docker-compose logs -f          # stream all logs
#   docker-compose logs -f stock-app # stream app logs only
#   docker-compose ps               # check status
#   docker-compose down             # stop & remove containers
#   docker-compose down -v          # stop + delete ALL volumes (wipes DB!)
#   docker-compose exec db psql -U fintech -d fintech_db  # open psql shell
#   docker-compose exec redis redis-cli                    # open redis shell

version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: fintech-db
    environment:
      POSTGRES_USER: fintech
      POSTGRES_PASSWORD: fintech_secret
      POSTGRES_DB: fintech_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fintech-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintech -d fintech_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis Cache ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fintech-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - fintech-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Stock Application ────────────────────────────────────────────────────
  stock-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: stock-app
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - APP_VERSION=2.0.0-dev
      - DATABASE_URL=postgresql://fintech:fintech_secret@db:5432/fintech_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fintech-net
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Elasticsearch ────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=fintech-cluster
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - fintech-net
    healthcheck:
      test: ["CMD-SHELL",
        "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Logstash ─────────────────────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    environment:
      - "LS_JAVA_OPTS=-Xmx512m -Xms512m"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - fintech-net
    restart: unless-stopped

  # ── Kibana ───────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=fintech-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - fintech-net
    restart: unless-stopped

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  elasticsearch-data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  fintech-net:
    driver: bridge
    name: fintech-network
