<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoDevOps FinTech · Login</title>
<style>
  :root {
    --bg: #080c14;
    --surface: #0d1520;
    --surface2: #111d2e;
    --border: rgba(0,210,255,0.08);
    --accent: #00d2ff;
    --accent2: #00ff9d;
    --red: #ff4757;
    --green: #00ff9d;
    --text: #e8f4f8;
    --muted: #4a6a80;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,210,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,210,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none;
  }
  body::after {
    content:'';
    position:fixed;
    top:-200px; left:50%; transform:translateX(-50%);
    width:800px; height:400px;
    background: radial-gradient(ellipse, rgba(0,210,255,0.08) 0%, transparent 70%);
    pointer-events:none;
  }
  .login-container {
    position:relative; z-index:1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    animation: scaleIn 0.4s cubic-bezier(0.2,0,0,1);
  }
  @keyframes scaleIn {
    from { opacity:0; transform:scale(0.95) translateY(20px); }
    to { opacity:1; transform:scale(1) translateY(0); }
  }
  .login-container::before {
    content:'';
    position:absolute; top:0; left:0; right:0;
    height:2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 20px 20px 0 0;
  }
  .logo-text {
    text-align:center;
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: 0.03em;
  }
  .logo-text span { color: var(--accent); }
  .subtitle {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 28px;
    letter-spacing: 0.05em;
  }
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .tab {
    flex:1;
    padding: 10px;
    text-align: center;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    border: none;
    transition: all 0.2s;
  }
  .tab.active {
    background: rgba(0,210,255,0.1);
    color: var(--accent);
  }
  .tab:hover:not(.active) {
    background: rgba(0,210,255,0.04);
    color: var(--text);
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.9rem;
    font-family: 'Segoe UI', system-ui, sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,210,255,0.1);
  }
  .submit-btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #0090b3);
    color: #fff;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,210,255,0.3);
  }
  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  .error-msg {
    background: rgba(255,71,87,0.1);
    border: 1px solid rgba(255,71,87,0.3);
    color: var(--red);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.78rem;
    margin-bottom: 16px;
    display: none;
  }
  .success-msg {
    background: rgba(0,255,157,0.1);
    border: 1px solid rgba(0,255,157,0.3);
    color: var(--green);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.78rem;
    margin-bottom: 16px;
    display: none;
  }
  .back-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 0.75rem;
    color: var(--muted);
    text-decoration: none;
  }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="login-container">
  <div class="logo-text">AutoDevOps <span>FinTech</span></div>
  <div class="subtitle">Stock Analysis Dashboard</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Login</button>
    <button class="tab" onclick="switchTab('register')">Register</button>
  </div>

  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>

  <!-- Login Form -->
  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-username" placeholder="Enter username" required autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter password" required autocomplete="current-password">
    </div>
    <button type="submit" class="submit-btn" id="login-btn">Sign In</button>
  </form>

  <!-- Register Form -->
  <form id="register-form" style="display:none" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="reg-username" placeholder="Choose a username" required minlength="3" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Choose a password" required minlength="4" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="reg-confirm" placeholder="Confirm password" required autocomplete="new-password">
    </div>
    <button type="submit" class="submit-btn" id="reg-btn">Create Account</button>
  </form>

  <a href="/" class="back-link">← Back to Dashboard</a>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('success-msg').style.display = 'none';

  if (tab === 'login') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('register-form').style.display = 'none';
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('register-form').style.display = 'block';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('success-msg').style.display = 'none';
}

function showSuccess(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    const res = await fetch('/do-login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('login-username').value,
        password: document.getElementById('login-password').value,
      })
    });
    const data = await res.json();
    if (res.ok) {
      showSuccess('Login successful! Redirecting...');
      setTimeout(() => window.location.href = '/', 500);
    } else {
      showError(data.error || 'Login failed');
    }
  } catch(err) {
    showError('Network error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const pw = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;

  if (pw !== confirm) {
    showError('Passwords do not match');
    return;
  }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const res = await fetch('/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('reg-username').value,
        password: pw,
      })
    });
    const data = await res.json();
    if (res.ok) {
      showSuccess('Account created! Redirecting...');
      setTimeout(() => window.location.href = '/', 500);
    } else {
      showError(data.error || 'Registration failed');
    }
  } catch(err) {
    showError('Network error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>
