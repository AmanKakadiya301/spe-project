# k8s/deployment.yaml
# FIXED: FINNHUB_API_KEY is now read from a Kubernetes Secret instead of
# being hardcoded in plaintext. This is a critical security fix.
#
# Create the secret before applying:
#   kubectl create secret generic stock-app-secrets \
#     --from-literal=FINNHUB_API_KEY=your_key_here \
#     --from-literal=FLASK_SECRET_KEY=your_flask_key \
#     -n fintech-prod

apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-app-deployment
  namespace: fintech-prod
  labels:
    app: stock-app
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-app

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app: stock-app
    spec:
      containers:
      - name: stock-app
        image: amankakadiya301/fintech-stock-app:latest
        imagePullPolicy: Always

        # FIXED: Load secrets from K8s Secret — never hardcode API keys
        env:
        - name: FINNHUB_API_KEY
          valueFrom:
            secretKeyRef:
              name: stock-app-secrets
              key: FINNHUB_API_KEY
        - name: FLASK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: stock-app-secrets
              key: FLASK_SECRET_KEY
        - name: FLASK_ENV
          value: "production"

        ports:
        - containerPort: 5000
          name: http

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3

        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
